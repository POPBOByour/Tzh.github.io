<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑;}
        body{background:#f4f4f4;display:flex;justify-content:center;align-items:center;height:100vh;}
        .login-box{width:380px;background:white;padding:30px;border-radius:12px;box-shadow:0 0 15px #ccc;}
        h2{text-align:center;margin-bottom:20px;color:#f89815;}
        .input-item{margin-bottom:15px;}
        input{width:100%;height:42px;padding:0 10px;border:1px solid #ddd;border-radius:6px;outline:none;}
        .code-box{display:flex;gap:10px;}
        #code{flex:1;}
        #codeImg{width:120px;height:42px;background:#f89815;color:white;text-align:center;line-height:42px;letter-spacing:6px;font-size:18px;border-radius:6px;cursor:pointer;}
        button{width:100%;height:45px;background:#f89815;color:white;border:none;border-radius:6px;font-size:16px;margin-top:10px;cursor:pointer;transition:.3s;}
        button:hover{transform:scale(1.03);background:#ff7d00;}
        .to-register{text-align:center;margin-top:15px;font-size:14px;}
        a{color:#f89815;text-decoration:none;}
    </style>
</head>
<body>
    <div class="login-box">
        <h2>用户登录</h2>
        <div class="input-item">
            <input type="text" id="user" placeholder="请输入用户名">
        </div>
        <div class="input-item">
            <input type="password" id="pwd" placeholder="请输入密码">
        </div>
        <div class="input-item code-box">
            <input type="text" id="code" placeholder="请输入验证码">
            <div id="codeImg" onclick="createCode()"></div>
        </div>
        <button onclick="login()">登录</button>
        <div class="to-register">没有账号？<a href="register.html">立即注册</a></div>
    </div>

    <script>
        var codeStr = "";
        window.onload = createCode;

        // 生成验证码
        function createCode(){
            codeStr = "";
            var codeLength = 4;
            var codeChars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            for(var i=0;i<codeLength;i++){
                codeStr += codeChars.charAt(Math.floor(Math.random()*codeChars.length));
            }
            document.getElementById("codeImg").innerHTML = codeStr;
        }

        // 登录验证
        function login(){
            var user = document.getElementById("user").value;
            var pwd = document.getElementById("pwd").value;
            var code = document.getElementById("code").value.toUpperCase();

            if(user=="" || pwd==""){
                alert("请输入用户名和密码！");
                return;
            }
            if(code != codeStr){
                alert("验证码错误！");
                createCode();
                return;
            }
            alert("登录成功！");
            location.href = "lab4-2503-102-index.html";
        }
    </script>
</body>
</html>
