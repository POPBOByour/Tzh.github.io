<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录表单</title>
    <style>
        /*全局样式重置*/
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            padding: 20px;
        }

        /*外层容器*/
        div#login {
            width: 450px;
            margin: 0 auto;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
        }

        /*头部：密码登录/验证码登录*/
        div.header {
            display: flex;
            border-bottom: 1px solid #e0e0e0;
        }
        ul.pass {
            display: flex;
            width: 100%;
            list-style: none;
        }
        ul.pass li {
            flex: 1;
            text-align: center;
            line-height: 50px;
            font-size: 18px;
            cursor: pointer;
        }
        ul.pass li:first-child {
            border-bottom: 2px solid #f40;
            color: #333;
            font-weight: bold;
        }
        span.line {
            width: 1px;
            height: 30px;
            background: #ccc;
            align-self: center;
        }
        ul.pass li a {
            text-decoration: none;
            color: #666;
        }
        ul.pass li:first-child a {
            color: #333;
            font-weight: bold;
        }

        /* 主体表单区域 */
        div.main {
            padding: 30px;
        }
        div.form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
        }
        div.form input[type="text"],
        div.form input[type="password"] {
            width: 100%;
            height: 45px;
            padding: 0 15px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 16px;
        }
        div.form input::placeholder {
            color: #999;
        }

        /* 协议同意区域 */
        p.agree {
            font-size: 14px;
            color: #999;
            margin-bottom: 25px;
        }
        p.agree a {
            color: #f40;
            text-decoration: none;
        }

        /* 登录按钮 */
        .but input[type="submit"] {
            width: 100%;
            height: 50px;
            background: #f40;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        /* 注册/忘记密码区域 */
        ul.register {
            display: flex;
            justify-content: space-between;
            list-style: none;
            padding: 0 30px 20px;
        }
        ul.register li a {
            text-decoration: none;
            color: #666;
            font-size: 14px;
        }

        /* 底部第三方登录 */
        div.footer {
            background: #f5f5f5;
            padding: 15px 30px;
        }
        div.footer ul {
            display: flex;
            justify-content: space-around;
            list-style: none;
        }
        div.footer ul li img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <!-- 登录表单容器 -->
    <div id="login">
        <!-- 头部：密码登录/验证码登录 -->
        <div class="header">
            <ul class="pass">
                <li><a href="#">密码登录</a></li>
                <span class="line"></span>
                <li><a href="#">验证码登录</a></li>
            </ul>
        </div>

        <!-- 主体内容 -->
        <div class="main">
            <form action="" method="post" class="form">
                <!-- 账号输入 -->
                <input type="text" placeholder="手机号/昵称/邮箱" name="account">
                <!-- 密码输入 -->
                <input type="password" placeholder="密码" name="pwd">

                <!-- 协议同意 -->
                <p class="agree">
                    登录即同意 <a href="#">用户协议</a>、<a href="#">隐私政策</a>
                </p>

                <!-- 登录按钮 -->
                <div class="but">
                    <input type="submit" value="登录">
                </div>
            </form>

            <!-- 注册/忘记密码 -->
            <ul class="register">
                <li><a href="#">立即注册</a></li>
                <li><a href="#">忘记密码</a></li>
            </ul>
        </div>

        <!-- 底部第三方登录 -->
        <div class="footer">
            <ul>
                <li><img src="https://img0.baidu.com/it/u=3981960719,387190710&fm=253&fmt=auto&app=138&f=JPEG?w=200&h=200" alt="微信"></li>
                <li><img src="https://img0.baidu.com/it/u=1234567890,1234567890&fm=253&fmt=auto&app=120&f=JPEG?w=200&h=200" alt="支付宝"></li>
                <li><img src="https://img0.baidu.com/it/u=987654321,987654321&fm=253&fmt=auto&app=120&f=JPEG?w=200&h=200" alt="QQ"></li>
                <li><img src="https://img0.baidu.com/it/u=1111111111,2222222222&fm=253&fmt=auto&app=120&f=JPEG?w=200&h=200" alt="微博"></li>
                <li><img src="https://img0.baidu.com/it/u=3333333333,4444444444&fm=253&fmt=auto&app=120&f=JPEG?w=200&h=200" alt="百度"></li>
            </ul>
        </div>
    </div>
</body>
</html>
