<!--5.1.4label标签-->
<body>
    <form action="" method="get" target="_self">
        <!-- 用户名输入项 -->
        <label for="use">用户名：</label>
        <input type="text" name="user" id="use" placeholder="输入用户名" required>
        <br>

        <!-- 密码输入项 -->
        <label for="word">密码：</label>
        <input type="password" name="pass" id="word" placeholder="输入密码" size="15" required>
        <br>

        <!-- 性别单选框 -->
        性别：
        <input type="radio" name="gender" id="man" checked>
        <label for="man">男</label>

        <input type="radio" name="gender" id="woman">
        <label for="woman">女</label>
        <br>

        <!-- 提交按钮 -->
        <input type="submit" name="but" value="提交">
    </form>
</body>
