<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>新用户注册 - 图书商城</title>
    <link rel="stylesheet" href="CSS/lab2-2503-102-index.css">
    <style>
        /* 直接复用登录页的样式逻辑 */
        .auth-container {
            width: 450px;
            margin: 50px auto;
            padding: 30px;
            border: 2px solid #f0f0f0;
        }
        .auth-form input {
            width: 100%;
            margin: 8px 0;
            padding: 12px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>创建新账号</h2>
        <form class="auth-form">
            <input type="text" placeholder="设置用户名" required>
            <input type="email" placeholder="电子邮箱" required>
            <input type="password" placeholder="设置密码" required>
            <input type="password" placeholder="确认密码" required>
            <button type="submit" class="btn-submit">同意协议并注册</button>
        </form>
        <p><a href="login.html">已有账号？去登录</a></p>
    </div>
</body>
</html>
